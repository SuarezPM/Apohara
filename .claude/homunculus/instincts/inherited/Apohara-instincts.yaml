# Apohara Workflow Test Audit And Classification

## Action

Follow the test-audit-and-classification workflow:
1. Run static audit on batches of test files, classifying each as KEEP_GREEN, KEEP_REFACTOR, INVESTIGATE, or KILL.
2. Write per-batch audit results to .claude/specs/tests/PHASE_5_2_AUDIT_BATCH{N}.md.
3. Update or create .claude/specs/tests/PHASE_5_2_AUDIT_SUMMARY.md with overall tallies and recommendations.
4. Empirically run the KEEP_GREEN and KEEP_REFACTOR cohorts, updating the summary with pass/fail counts.
5. Repeat for additional batches until all test files are covered.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: .claude/specs/tests/PHASE_5_2_AUDIT_BATCH1.md, .claude/specs/tests/PHASE_5_2_AUDIT_BATCH2.md, .claude/specs/tests/PHASE_5_2_AUDIT_BATCH3.md

