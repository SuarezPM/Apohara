name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        env:
          # Force mock embedding model so the indexer-dependent test paths
          # skip the ~400 MB BERT load. Real model is gated behind explicit
          # opt-out per CLAUDE.md §8.1 (OOM hazard rule).
          APOHARA_MOCK_EMBEDDINGS: "1"
        run: bun test

      - name: Lint code
        run: bunx biome format --write