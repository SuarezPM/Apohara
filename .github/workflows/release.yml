name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # Security audit - run before cross-compilation to fail fast
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo audit
        run: cargo audit

  # Cross-compile Rust for all platforms
  build:
    name: Build (${{ matrix.platform }})
    needs: security-audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            target: x86_64-unknown-linux-gnu
            artifact: clarity-code-linux-x64
          - platform: darwin-x64
            target: x86_64-apple-darwin
            artifact: clarity-code-darwin-x64
          - platform: darwin-arm64
            target: aarch64-apple-darwin
            artifact: clarity-code-darwin-arm64
          - platform: win32-x64
            target: x86_64-pc-windows-msvc
            artifact: clarity-code-win32-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build release
        working-directory: isolation-engine
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create artifact
        run: |
          mkdir -p bin/${{ matrix.platform }}
          if [ "${{ matrix.platform }}" = "win32-x64" ]; then
            cp isolation-engine/target/${{ matrix.target }}/release/isolation-engine.exe bin/${{ matrix.platform }}/
          else
            cp isolation-engine/target/${{ matrix.target }}/release/isolation-engine bin/${{ matrix.platform }}/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/${{ matrix.platform }}
          retention-days: 1

  # Run E2E tests
  e2e-tests:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Setup binaries
        run: |
          mkdir -p binaries/linux-x64 binaries/darwin-x64 binaries/darwin-arm64 binaries/win32-x64
          chmod +x binaries/clarity-code-linux-x64/isolation-engine
          chmod +x binaries/clarity-code-darwin-x64/isolation-engine
          chmod +x binaries/clarity-code-darwin-arm64/isolation-engine

      - name: Build npm package for testing
        run: npm pack

      - name: Run E2E tests
        run: bun test tests/e2e/install-and-run.test.ts

  # Publish to npm
  publish:
    name: Publish to npm
    needs: e2e-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Setup binaries
        run: |
          mkdir -p binaries/linux-x64 binaries/darwin-x64 binaries/darwin-arm64 binaries/win32-x64
          chmod +x binaries/clarity-code-linux-x64/isolation-engine
          chmod +x binaries/clarity-code-darwin-x64/isolation-engine
          chmod +x binaries/clarity-code-darwin-arm64/isolation-engine
          # For Windows, the artifact is already an .exe

      - name: Configure npm for GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          echo "registry=https://npm.pkg.github.com" >> .npmrc

      - name: Publish to GitHub Packages
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}